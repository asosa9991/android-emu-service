## template: jinja
#cloud-config
#
# Bootstraps a GCE VM to run the Android Emulator with a WebRTC web UI.
# Services: coturn (TURN relay), emulator, nginx (React UI), envoy (gRPC-Web proxy), adb-server (file upload/APK install).
#
# Expected VM: n2-standard-4 or larger, --enable-nested-virtualization, Ubuntu 22.04 LTS.

packages:
  - docker.io
  - docker-compose-v2
  - coturn
  - curl

write_files:
  # ── Envoy proxy config ───────────────────────────────────────────────────────
  - path: /opt/emulator/envoy.yaml
    permissions: "0644"
    owner: root
    content: |
      static_resources:
        listeners:
        - name: listener_0
          address:
            socket_address: { address: 0.0.0.0, port_value: 8080 }
          filter_chains:
          - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                codec_type: auto
                stat_prefix: ingress_http
                route_config:
                  name: local_route
                  virtual_hosts:
                  - name: local_service
                    domains: ["*"]
                    routes:
                    - match:
                        prefix: "/android.emulation.control.Rtc"
                      route:
                        cluster: emulator_service_grpc
                        timeout: 0s
                        max_stream_duration:
                          grpc_timeout_header_max: 0s
                    - match:
                        prefix: "/android.emulation.control"
                      route:
                        cluster: emulator_service_grpc
                        timeout: 0s
                        max_stream_duration:
                          grpc_timeout_header_max: 0s
                    - match:
                        prefix: "/api"
                      route:
                        cluster: adb_server
                        timeout: 120s
                    - match:
                        prefix: "/"
                      route:
                        cluster: nginx
                    cors:
                      allow_origin_string_match:
                      - safe_regex:
                          google_re2: {}
                          regex: ".*"
                      allow_methods: GET, PUT, DELETE, POST, OPTIONS
                      allow_headers: keep-alive,user-agent,cache-control,content-type,content-transfer-encoding,content-length,custom-header-1,x-accept-content-transfer-encoding,x-accept-response-streaming,x-user-agent,x-grpc-web,grpc-timeout,authorization
                      max_age: "1728000"
                      expose_headers: custom-header-1,grpc-status,grpc-message
                http_filters:
                - name: envoy.filters.http.cors
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                - name: envoy.filters.http.grpc_web
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWeb
                - name: envoy.filters.http.router
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
        clusters:
        - name: emulator_service_grpc
          connect_timeout: 0.250s
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          http2_protocol_options: {}
          load_assignment:
            cluster_name: emulator_service_grpc
            endpoints:
            - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: emulator
                      port_value: 8554
        - name: nginx
          connect_timeout: 0.25s
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: nginx
            endpoints:
            - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: nginx
                      port_value: 80
        - name: adb_server
          connect_timeout: 0.25s
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: adb_server
            endpoints:
            - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: adb-server
                      port_value: 3000
      admin:
        access_log_path: "/dev/stdout"
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 8001

  # ── docker-compose.yml ───────────────────────────────────────────────────────
  - path: /opt/emulator/docker-compose.yml
    permissions: "0644"
    owner: root
    content: |
      version: "3.8"
      networks:
        envoymesh:
          driver: bridge
      services:
        emulator:
          image: us-docker.pkg.dev/android-emulator-268719/images/30-google-x64:latest
          container_name: emulator_emulator
          networks:
            envoymesh:
              aliases: [emulator]
          devices:
            - /dev/kvm:/dev/kvm
          volumes:
            - /etc/emulator/get-ice-config.sh:/get-ice-config.sh:ro
          tmpfs:
            - /data
          ports:
            - "5555:5555"
          environment:
            - TURN=/get-ice-config.sh
          restart: unless-stopped
        adb-server:
          build:
            context: ./server
            dockerfile: Dockerfile
          image: emulator_adb_server:latest
          container_name: emulator_adb_server
          networks:
            envoymesh:
              aliases: [adb-server]
          depends_on:
            - emulator
          restart: unless-stopped
        nginx:
          image: emulator_nginx:latest
          container_name: emulator_nginx
          networks:
            - envoymesh
          restart: unless-stopped
        envoy:
          image: envoyproxy/envoy:v1.26-latest
          container_name: emulator_envoy
          networks:
            - envoymesh
          ports:
            - "80:8080"
            - "443:8080"
            - "8080:8080"
            - "8001:8001"
          volumes:
            - /opt/emulator/envoy.yaml:/etc/envoy/envoy.yaml:ro
          restart: unless-stopped

  # ── adb-server: Dockerfile ───────────────────────────────────────────────────
  - path: /opt/emulator/server/Dockerfile
    permissions: "0644"
    owner: root
    content: |
      FROM node:20-alpine
      RUN apk add --no-cache android-tools
      WORKDIR /app
      COPY package.json ./
      RUN npm install --production
      COPY server.js start.sh ./
      RUN chmod +x start.sh
      EXPOSE 3000
      CMD ["/app/start.sh"]

  # ── adb-server: package.json ─────────────────────────────────────────────────
  - path: /opt/emulator/server/package.json
    permissions: "0644"
    owner: root
    content: |
      {
        "name": "adb-server",
        "version": "1.0.0",
        "dependencies": {
          "express": "^4.18.2",
          "multer": "^1.4.5-lts.1"
        }
      }

  # ── adb-server: start.sh ─────────────────────────────────────────────────────
  - path: /opt/emulator/server/start.sh
    permissions: "0755"
    owner: root
    content: |
      #!/bin/sh
      set -e
      echo "[adb-server] Starting ADB server..."
      adb start-server
      echo "[adb-server] Waiting for emulator ADB on emulator:5555..."
      MAX_RETRIES=30
      i=0
      while [ $i -lt $MAX_RETRIES ]; do
        if adb connect emulator:5555 2>&1 | grep -qE "connected|already connected"; then
          echo "[adb-server] Connected"
          break
        fi
        echo "[adb-server] Retrying in 5s... ($i/$MAX_RETRIES)"
        sleep 5
        i=$((i + 1))
      done
      adb devices
      exec node server.js

  # ── adb-server: server.js ────────────────────────────────────────────────────
  - path: /opt/emulator/server/server.js
    permissions: "0644"
    owner: root
    content: |
      const express = require("express");
      const multer = require("multer");
      const { execFile } = require("child_process");
      const fs = require("fs");
      const path = require("path");

      const app = express();
      const PORT = 3000;
      const DEVICE = "emulator:5555";

      const storage = multer.diskStorage({
        destination: "/tmp/uploads",
        filename: (_req, file, cb) => {
          const ext = path.extname(file.originalname) || "";
          cb(null, `upload-${Date.now()}${ext}`);
        },
      });
      const upload = multer({ storage, limits: { fileSize: 2 * 1024 * 1024 * 1024 } });

      fs.mkdirSync("/tmp/uploads", { recursive: true });

      function adb(...args) {
        return new Promise((resolve, reject) => {
          execFile("adb", ["-s", DEVICE, ...args], { timeout: 120000 }, (err, stdout, stderr) => {
            if (err) reject(new Error(stderr || err.message));
            else resolve(stdout);
          });
        });
      }

      function cleanup(p) { fs.unlink(p, () => {}); }

      app.post("/api/upload", upload.single("file"), async (req, res) => {
        if (!req.file) return res.status(400).json({ error: "No file provided" });
        const localPath = req.file.path;
        const remotePath = `/sdcard/Download/${req.file.originalname}`;
        console.log(`[upload] ${req.file.originalname} -> ${remotePath}`);
        try {
          await adb("push", localPath, remotePath);
          res.json({ ok: true, path: remotePath });
        } catch (err) {
          res.status(500).json({ error: err.message });
        } finally { cleanup(localPath); }
      });

      app.post("/api/install", upload.single("file"), async (req, res) => {
        if (!req.file) return res.status(400).json({ error: "No file provided" });
        const localPath = req.file.path;
        if (!req.file.originalname.toLowerCase().endsWith(".apk")) {
          cleanup(localPath);
          return res.status(400).json({ error: "File must be an APK" });
        }
        console.log(`[install] Installing ${req.file.originalname}...`);
        try {
          const output = await adb("install", "-r", localPath);
          res.json({ ok: true, output: output.trim() });
        } catch (err) {
          res.status(500).json({ error: err.message });
        } finally { cleanup(localPath); }
      });

      app.get("/api/health", (_req, res) => res.json({ ok: true }));
      app.listen(PORT, () => console.log(`[adb-server] Listening on :${PORT}`));

  # ── nginx Dockerfile ─────────────────────────────────────────────────────────
  - path: /opt/emulator/nginx/Dockerfile
    permissions: "0644"
    owner: root
    content: |
      FROM node:20-alpine as build-stage
      RUN apk add --no-cache git
      RUN git clone --depth=1 https://github.com/google/android-emulator-container-scripts.git /src
      WORKDIR /app
      RUN cp /src/js/package*.json .
      RUN npm install
      COPY patch.js patch.js
      RUN node patch.js
      RUN cp -r /src/js/. .
      COPY src/ src/
      RUN npm run build
      FROM nginx:1.21-alpine as production-stage
      COPY --from=build-stage /app/build /usr/share/nginx/html
      EXPOSE 80
      CMD ["nginx", "-g", "daemon off;"]

  # ── patch.js: npm package fixes ──────────────────────────────────────────────
  - path: /opt/emulator/nginx/patch.js
    permissions: "0644"
    owner: root
    content: |
      var fs = require('fs');

      // Fix 1: event_handler.js - wrapper div has no height, making video invisible.
      var ehFile = 'node_modules/android-emulator-webrtc/src/components/emulator/views/event_handler.js';
      var eh = fs.readFileSync(ehFile, 'utf8');
      var ehPatched = eh.replace('display: "inline-block",', 'display: "block", height: "100%",');
      if (ehPatched === eh) { console.log('WARNING: event_handler patch not applied'); }
      else { fs.writeFileSync(ehFile, ehPatched); console.log('Patched event_handler.js'); }

      // Fix 2: jsep_protocol_driver.js - inject TURN/STUN servers.
      // signal.start is a GUID string, so RTCPeerConnection gets no ICE servers.
      // TURN host uses window.location.hostname so no IP is baked into the image.
      // Must patch BOTH src/ (ES6) and dist/ (Babel-compiled) because
      // emulator/index.js does require('../dist'), so webpack bundles dist/, not src/.
      // Babel compiles `this` -> `_this` in the dist version.
      var iceServersCode = [
        '      { urls: "stun:stun.l.google.com:19302" },',
        '      { urls: ["turn:" + window.location.hostname + ":3478", "turn:" + window.location.hostname + ":3478?transport=tcp"], username: "emulator", credential: "emulator123" }'
      ].join('\n');

      // Patch src/
      var jsepSrcFile = 'node_modules/android-emulator-webrtc/src/components/emulator/net/jsep_protocol_driver.js';
      var jsepSrc = fs.readFileSync(jsepSrcFile, 'utf8');
      var srcOld = 'this.peerConnection = new RTCPeerConnection(signal.start);';
      var srcNew = [
        'var iceConfig = (signal.start && typeof signal.start === "object") ? signal.start : {};',
        '    iceConfig.iceServers = [',
        iceServersCode,
        '    ];',
        '    this.peerConnection = new RTCPeerConnection(iceConfig);'
      ].join('\n    ');
      var jsepSrcPatched = jsepSrc.replace(srcOld, srcNew);
      if (jsepSrcPatched === jsepSrc) { console.log('WARNING: jsep src patch not applied'); }
      else { fs.writeFileSync(jsepSrcFile, jsepSrcPatched); console.log('Patched jsep_protocol_driver.js (src)'); }

      // Patch dist/ (Babel-compiled: this -> _this) — THIS is what webpack actually bundles
      var jsepDistFile = 'node_modules/android-emulator-webrtc/dist/components/emulator/net/jsep_protocol_driver.js';
      var jsepDist = fs.readFileSync(jsepDistFile, 'utf8');
      var distOld = '_this.peerConnection = new RTCPeerConnection(signal.start);';
      var distNew = [
        'var iceConfig = (signal.start && typeof signal.start === "object") ? signal.start : {};',
        '          iceConfig.iceServers = [',
        iceServersCode,
        '          ];',
        '          _this.peerConnection = new RTCPeerConnection(iceConfig);'
      ].join('\n');
      var jsepDistPatched = jsepDist.replace(distOld, distNew);
      if (jsepDistPatched === jsepDist) { console.log('WARNING: jsep dist patch not applied'); }
      else { fs.writeFileSync(jsepDistFile, jsepDistPatched); console.log('Patched jsep_protocol_driver.js (dist)'); }

  # ── React: config.js ─────────────────────────────────────────────────────────
  - path: /opt/emulator/nginx/src/config.js
    permissions: "0644"
    owner: root
    content: |
      export const config = { auth: { type: "none" } };

  # ── React: App.js ────────────────────────────────────────────────────────────
  - path: /opt/emulator/nginx/src/App.js
    permissions: "0644"
    owner: root
    content: |
      import React, { useState, useEffect } from "react";
      import { TokenProviderService } from "./service/auth_service";
      import EmulatorScreen from "./components/emulator_screen";
      import LoginPage from "./components/login_firebase";
      import { ThemeProvider } from "@mui/styles";
      import { createTheme } from "@mui/material/styles";
      import { config } from "./config";
      import "./App.css";

      var EMULATOR_GRPC = window.location.protocol + "//" + window.location.hostname + ":8080";
      console.log(`Connecting to grpc at ${EMULATOR_GRPC}`);

      const theme = createTheme({});
      const noAuth = config.auth && config.auth.type === "none";
      const auth = new TokenProviderService();
      if (noAuth) { auth.setToken("no-auth"); }

      export default function App() {
        const [authorized, setAuthorized] = useState(noAuth);
        useEffect(() => { auth.on("authorized", (a) => setAuthorized(a)); }, []);
        return (
          <ThemeProvider theme={theme}>
            {authorized ? <EmulatorScreen uri={EMULATOR_GRPC} auth={auth} /> : <LoginPage auth={auth} />}
          </ThemeProvider>
        );
      }

  # ── React: login_firebase.js ─────────────────────────────────────────────────
  - path: /opt/emulator/nginx/src/components/login_firebase.js
    permissions: "0644"
    owner: root
    content: |
      import React, { useEffect } from "react";
      import PropTypes from "prop-types";
      import Typography from "@mui/material/Typography";
      import Container from "@mui/material/Container";
      import CircularProgress from "@mui/material/CircularProgress";
      import Box from "@mui/material/Box";

      export default function AutoLogin({ auth }) {
        useEffect(() => { auth.setToken("no-auth"); }, [auth]);
        return (
          <Container maxWidth="xs">
            <Box mt={10} display="flex" flexDirection="column" alignItems="center">
              <CircularProgress />
              <Box mt={2}><Typography variant="body1">Connecting to emulator...</Typography></Box>
            </Box>
          </Container>
        );
      }
      AutoLogin.propTypes = { auth: PropTypes.object.isRequired };

  # ── React: emulator_screen.js (drag-and-drop + APK install) ─────────────────
  - path: /opt/emulator/nginx/src/components/emulator_screen.js
    permissions: "0644"
    owner: root
    content: |
      import withStyles from "@mui/styles/withStyles";
      import AppBar from "@mui/material/AppBar";
      import Box from "@mui/material/Box";
      import Copyright from "./copyright";
      import { Emulator } from "android-emulator-webrtc/emulator";
      import LogcatView from "./logcat_view";
      import ExitToApp from "@mui/icons-material/ExitToApp";
      import IconButton from "@mui/material/IconButton";
      import ImageIcon from "@mui/icons-material/Image";
      import OndemandVideoIcon from "@mui/icons-material/OndemandVideo";
      import PropTypes from "prop-types";
      import React from "react";
      import Toolbar from "@mui/material/Toolbar";
      import Typography from "@mui/material/Typography";

      const EMU_WIDTH = 400;
      const EMU_HEIGHT = 700;

      const styles = () => ({
        root: { flexGrow: 1 },
        title: { flexGrow: 1 },
        emuWrapper: {
          position: "relative",
          width: EMU_WIDTH,
          height: EMU_HEIGHT,
          flexShrink: 0,
        },
        emuContainer: {
          width: "100%",
          height: "100%",
          "& > div": { width: "100% !important", height: "100% !important" },
          "& video": { width: "100% !important", height: "100% !important" },
          "& canvas": { width: "100% !important", height: "100% !important" },
        },
        dropOverlay: {
          position: "absolute",
          top: 0, left: 0, width: "100%", height: "100%",
          display: "flex", flexDirection: "column",
          alignItems: "center", justifyContent: "center",
          backgroundColor: "rgba(0,0,0,0.65)",
          color: "#fff", fontSize: 20, fontWeight: "bold",
          borderRadius: 4, gap: 12, zIndex: 10,
          pointerEvents: "none",
        },
        dropIcon: { fontSize: 56, lineHeight: 1 },
        statusBar: {
          padding: "6px 14px", borderRadius: 4, fontSize: 13,
          fontWeight: "normal", maxWidth: EMU_WIDTH - 32,
          wordBreak: "break-all", textAlign: "center",
        },
      });

      class EmulatorScreen extends React.Component {
        state = {
          view: "webrtc", emuState: "connecting", muted: true,
          gps: { latitude: 37.4221, longitude: -122.0841 },
          dragDepth: 0, dragIsApk: false, uploadStatus: null,
        };
        static propTypes = { uri: PropTypes.string, auth: PropTypes.object };
        stateChange = (s) => this.setState({ emuState: s });
        onError = (err) => console.error("gRPC error:", err);

        onDragEnter = (e) => {
          e.preventDefault();
          const isApk = [...(e.dataTransfer.items || [])].some(
            (i) => i.kind === "file" && i.type === "application/vnd.android.package-archive"
          );
          this.setState((prev) => ({ dragDepth: prev.dragDepth + 1, dragIsApk: isApk }));
        };
        onDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = "copy"; };
        onDragLeave = (e) => {
          e.preventDefault();
          this.setState((prev) => ({ dragDepth: Math.max(0, prev.dragDepth - 1) }));
        };
        onDrop = (e) => {
          e.preventDefault();
          this.setState({ dragDepth: 0 });
          const file = e.dataTransfer.files[0];
          if (!file) return;
          this._upload(file, file.name.toLowerCase().endsWith(".apk") ? "/api/install" : "/api/upload");
        };

        _upload(file, endpoint) {
          const isInstall = endpoint === "/api/install";
          this.setState({ uploadStatus: { type: "progress", message: isInstall ? `Installing ${file.name}...` : `Uploading ${file.name} to /sdcard/Download/...` } });
          const form = new FormData();
          form.append("file", file);
          fetch(endpoint, { method: "POST", body: form })
            .then((r) => r.json())
            .then((data) => {
              if (!data.ok) throw new Error(data.error || "Unknown error");
              this.setState({ uploadStatus: { type: "success", message: isInstall ? `Installed ${file.name}` : `Saved to ${data.path}` } });
            })
            .catch((err) => { this.setState({ uploadStatus: { type: "error", message: err.message } }); })
            .finally(() => { setTimeout(() => this.setState({ uploadStatus: null }), 5000); });
        }

        render() {
          const { uri, auth, classes } = this.props;
          const { view, emuState, muted, gps, dragDepth, dragIsApk, uploadStatus } = this.state;
          const isDragging = dragDepth > 0;
          const statusBg = uploadStatus?.type === "success" ? "rgba(46,125,50,0.9)" : uploadStatus?.type === "error" ? "rgba(183,28,28,0.9)" : "rgba(30,30,30,0.85)";
          return (
            <div className={classes.root}>
              <AppBar position="static">
                <Toolbar>
                  <Typography variant="h6" className={classes.title}>Android Emulator — {view} — {emuState}</Typography>
                  <IconButton color="inherit" onClick={() => this.setState({ view: "webrtc" })} size="large"><OndemandVideoIcon /></IconButton>
                  <IconButton color="inherit" onClick={() => this.setState({ view: "png" })} size="large"><ImageIcon /></IconButton>
                  <IconButton color="inherit" onClick={() => auth.logout()} size="large"><ExitToApp /></IconButton>
                </Toolbar>
              </AppBar>
              <Box p={2} display="flex" gap={2}>
                <div className={classes.emuWrapper} onDragEnter={this.onDragEnter} onDragOver={this.onDragOver} onDragLeave={this.onDragLeave} onDrop={this.onDrop}>
                  <div className={classes.emuContainer}>
                    <Emulator uri={uri} auth={auth} view={view} onStateChange={this.stateChange} onError={this.onError} muted={muted} volume={0} gps={gps} width={EMU_WIDTH} height={EMU_HEIGHT} />
                  </div>
                  {(isDragging || uploadStatus) && (
                    <div className={classes.dropOverlay}>
                      {isDragging ? (
                        <><div className={classes.dropIcon}>{dragIsApk ? "📦" : "📁"}</div><div>{dragIsApk ? "Drop to Install APK" : "Drop to Upload to /sdcard/Download/"}</div></>
                      ) : (
                        <div className={classes.statusBar} style={{ backgroundColor: statusBg }}>
                          {uploadStatus.type === "progress" && "⏳ "}{uploadStatus.type === "success" && "✓ "}{uploadStatus.type === "error" && "✗ "}{uploadStatus.message}
                        </div>
                      )}
                    </div>
                  )}
                </div>
                <Box flex={1} minWidth={300} maxWidth={500}><LogcatView uri={uri} auth={auth} /></Box>
              </Box>
              <Box mt={4}><Copyright /></Box>
            </div>
          );
        }
      }
      export default withStyles(styles)(EmulatorScreen);

  # ── systemd service ──────────────────────────────────────────────────────────
  - path: /etc/systemd/system/aemu.service
    permissions: "0644"
    owner: root
    content: |
      [Unit]
      Description=Android Emulator Stack
      Requires=docker.service
      After=docker.service network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      WorkingDirectory=/opt/emulator
      ExecStart=/usr/bin/docker compose up -d
      ExecStop=/usr/bin/docker compose down
      TimeoutStartSec=600

      [Install]
      WantedBy=multi-user.target

runcmd:
  - |
    set -e

    # Fix KVM permissions
    udevadm control --reload-rules && udevadm trigger
    chown root:kvm /dev/kvm && chmod 0660 /dev/kvm

    # Fetch GCE external and internal IPs from instance metadata
    EXTERNAL_IP=$(curl -sf -H "Metadata-Flavor: Google" \
      "http://metadata.google.internal/computeMetadata/v1/instance/network-interfaces/0/access-configs/0/external-ip")
    INTERNAL_IP=$(curl -sf -H "Metadata-Flavor: Google" \
      "http://metadata.google.internal/computeMetadata/v1/instance/network-interfaces/0/ip")
    echo "External IP: $EXTERNAL_IP  Internal IP: $INTERNAL_IP"

    # coturn config
    mkdir -p /etc/emulator
    cat > /etc/turnserver.conf <<TURNEOF
    listening-port=3478
    listening-ip=0.0.0.0
    external-ip=${EXTERNAL_IP}
    realm=emulator
    lt-cred-mech
    user=emulator:emulator123
    fingerprint
    no-tls
    no-dtls
    log-file=/var/log/turnserver.log
    TURNEOF
    systemctl enable coturn && systemctl start coturn

    # ICE config script (the emulator calls this at WebRTC session start)
    # IMPORTANT: Use INTERNAL_IP here, not EXTERNAL_IP.
    # Docker containers on GCE cannot reach the instance's own external IP (GCP hairpin NAT).
    # coturn's external-ip= setting still advertises the external IP to relay candidates,
    # so browsers outside the VM connect correctly via the external IP.
    cat > /etc/emulator/get-ice-config.sh <<ICEEOF
    #!/bin/sh
    printf '{"iceServers":[{"urls":["turn:${INTERNAL_IP}:3478"],"username":"emulator","credential":"emulator123"},{"urls":["stun:stun.l.google.com:19302"]}]}'
    ICEEOF
    chmod +x /etc/emulator/get-ice-config.sh

    # Enable Docker
    systemctl enable docker && systemctl start docker

    # Build images
    docker build -t emulator_adb_server:latest /opt/emulator/server
    docker build -t emulator_nginx:latest /opt/emulator/nginx

    # Start all services
    systemctl enable aemu.service && systemctl start aemu.service
